<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Saúde</title>

  <!-- Ícones Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="sha512-y8pM26kgVm8FzPl/1vIrOek2a5zuwG6mNR9aQo2z0Xl7X3kLEsXq9bdT+5QuPgJ4pE7U9Yo7Vp3skPy9xNkfbg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- Estilos CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <header>
    <div style="display: flex; justify-content: space-between; width: 100%; align-items: center;">
      <div class="menu-toggle" onclick="toggleMenu()">
        <i class="fas fa-bars"></i>
      </div>
    </div>

    <nav id="navMenu">
      <div class="menu-item">
        <a href="#">Agenda de Consultas</a>
        <div class="submenu">
          <a href="#">Nova Consulta</a>
          <a href="#">Consultas Pendentes</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="#">Prescrições e Atestados</a>
        <div class="submenu">
          <a href="#">Minhas Prescrições</a>
          <a href="#">Emitir Atestado</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="#">Histórico de Consultas</a>
        <div class="submenu">
          <a href="#">Últimos 30 dias</a>
          <a href="#">Buscar por data</a>
        </div>
      </div>
      <div class="menu-item">
        <a href="#">Gerenciamento de Horários</a>
        <div class="submenu">
          <a href="#">Definir Horários</a>
          <a href="#">Editar Disponibilidade</a>
        </div>
      </div>
    </nav>

    <div class="icons">
      <div class="profile-img">
        <img src="https://via.placeholder.com/150" alt="Perfil">
      </div>
    </div>
  </header>

  <main>
    <div class="carousel" id="carousel">
      <img src="https://via.placeholder.com/800x300?text=Imagem+1" class="active">
      <img src="https://via.placeholder.com/800x300?text=Imagem+2">
      <img src="https://via.placeholder.com/800x300?text=Imagem+3">
    </div>
  </main>

  <!-- Scripts JS -->
  <script src="js/script.js"></script>
</body>
</html>
